baseURL: "https://tarunrithvik.github.io/"
title: "TechReview India"
theme: "PaperMod"
languageCode: "en-us"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false

params:
  env: production
  description: "Honest tech reviews, comparisons & guides for India 🇮🇳"
  author: "TechReview India"
  keywords: ["tech reviews india", "best hosting india", "ai tools india", "demat account india"]
  
  # Light mode with colorful accents (modern look)
  defaultTheme: "light"
  
  homeInfoParams:
    Title: "🚀 TechReview India"
    Content: "Honest reviews, detailed comparisons & smart buying guides for Indian users. We help you make the best tech & finance decisions."

  # Cover image on posts
  cover:
    linkFullImages: true
    responsiveImages: true

  # Show reading time, share buttons
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  
  # Modern social icons
  socialIcons:
    - name: github
      url: "https://github.com/Tarunrithvik"
    - name: email
      url: "mailto:b.tarunrithvik@gmail.com"

  # Assets
  assets:
    favicon: "🚀"

menu:
  main:
    - name: "🏠 Home"
      url: "/"
      weight: 1
    - name: "💻 Reviews"
      url: "/categories/web-hosting/"
      weight: 2
    - name: "⚡ Comparisons"
      url: "/categories/ai-tools/"
      weight: 3
    - name: "💰 Finance"
      url: "/categories/personal-finance/"
      weight: 4
    - name: "🔍 Search"
      url: "/search/"
      weight: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true